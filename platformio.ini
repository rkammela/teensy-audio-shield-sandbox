; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 115200

; Teensy Audio Library and dependencies
lib_deps =
    https://github.com/PaulStoffregen/Audio.git
    https://github.com/PaulStoffregen/Wire.git
    SPI
    SD
    SerialFlash
    sparkfun/SparkFun VL53L5CX Arduino Library@^1.0.2
    fastled/FastLED@^3.7.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.3
    paulstoffregen/Encoder@^1.4.4

; Build flags for optimization (optional)
build_flags =
    -O2
    -DUSB_SERIAL
